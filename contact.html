<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
        <script type="text/javascript"
                src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
        </script>
        <script type="text/javascript">
        (function(){
            emailjs.init({
                publicKey: "oGGJT-mcQSBQ_zZVk",
            });
        })();
        </script>
        <title>Portfolio</title>
    </head>
    <body class="contact-body">
        <header>
            <a class="ham-link" href="">
                <img class="ham-icon" src="icons/ham-menu.svg" alt="">
            </a>
            <div class="header-menu">
                <ul>
                    <li><a href="home.html">HOME</a></li>
                    <li><a href="work.html">WORK</a></li>
                    <li><a href="contact.html" class="currentPage">CONTACT</a></li>
                </ul>
            </div>
        </header>
        <section class="nav-section">
            <a href="">
                <img class="x-icon" src="icons/x.svg" alt="">
            </a>
            <div class="menu">
                <p><a href="home.html">HOME</a></p>
                <p><a href="work.html">Work</a></p>  
                <p><a href="contact.html">Contact</a></p>
            </div>
        </section>
        <main class="main-section main-section-contact">
            <div class="contact">
                <div class="contact-form">
                    <div class="contact-form-header">
                        <img class="contact-pfp" src="./images/contact-pfp.PNG" alt="">
                        <div>
                            <h3>Have an idea?</h3>
                            <p>Feel free to contact me</p>
                        </div>
                    </div>
                    <form>
                        <label for="name"></label>
                        <input class="form-input" type="text" placeholder="Your Name" id="name" name="name" required>
                        <label for="email"></label>
                        <input class="form-input" type="text" placeholder="Your Email" id="email" name="email" required>
                        <label for="subject"></label>
                        <input class="form-input about-yourself-input" type="text" placeholder="Shortly tell me about yourself" id="subject" name="subject" required>
                        <button class="contact-btn" onclick="sendMail(event)" type="button">Contact me</button>
                    </form>
                </div>
                <div class="or-section">
                    <div class="or-line"></div>
                    <div class="or-text">or</div>
                    <div class="or-line"></div>
                </div>
                <div class="contact-socials">
                    <a class="socials-link" href="#">
                        <div class="contact-socials-items">
                            <img class="contact-socials-img" src="icons/instagram.svg" alt="">
                            <p>Instagram</p>
                        </div>
                    </a>
                    <a class="socials-link" href="https://www.linkedin.com/feed/" target="_blank">
                        <div class="contact-socials-items">
                            <img class="contact-socials-img" src="icons/linkdin.svg" alt="">
                            <p>LinkdIn</p>
                        </div>
                    </a>
                    <a class="socials-link" href="#">
                        <div class="contact-socials-items">
                            <img class="contact-socials-img" src="icons/twitter.svg" alt="">
                            <p>(twiiter)</p>
                        </div>
                    </a>
                </div>
            </div>
        </main>
        <script src="index.js"></script>
    </body>
</html>
